services:
  backend:
    build: ./backend
    container_name: hmss_clean_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=hmss_local_secret_change_me
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hmss_clean_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
